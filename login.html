<!DOCTYPE html><html><head><meta charset='UTF-8'><title>PokBot</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:400px;height:500px;background-image:url('bg.png');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;-webkit-app-region:drag}.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35)}.card{position:relative;z-index:1;background:rgba(220,30,60,0.92);border-radius:18px;padding:30px 35px;width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.6);-webkit-app-region:no-drag;backdrop-filter:blur(4px)}.logo{font-size:56px;margin-bottom:8px}h1{color:white;font-size:26px;font-weight:900;letter-spacing:4px;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,0.4)}input{width:100%;padding:10px 14px;border:none;border-radius:6px;font-size:14px;margin-bottom:10px;background:rgba(255,255,255,0.95);outline:none}.row{display:flex;gap:8px;margin-top:4px}.row input{flex:1;margin-bottom:0}button{background:#1a1a2e;color:white;border:none;border-radius:6px;padding:10px 18px;font-size:14px;font-weight:bold;cursor:pointer;letter-spacing:1px}button:hover{background:#0f3460}.error{color:#fff;font-size:12px;margin-top:8px;min-height:18px}.wintitle{position:fixed;top:8px;right:10px;display:flex;gap:6px;-webkit-app-region:no-drag}.wbtn{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer}.wbtn.close{background:#ff5f57}.wbtn.min{background:#febc2e}</style></head><body><div class='overlay'></div><div class='wintitle'><button class='wbtn min' onclick='window.api.minimize()'></button><button class='wbtn close' onclick='window.api.close()'></button></div><div class='card'><div class='logo'>⚡</div><h1>PokBot</h1><input type='text' id='user' placeholder='usuario'/><div class='row'><input type='password' id='pass' placeholder='••••••••••'/><button onclick='doLogin()'>ENTRAR</button></div><div class='error' id='err'></div></div><script>function doLogin(){const u=document.getElementById('user').value;const p=document.getElementById('pass').value;window.api.login(u,p)}document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});window.api.onLoginError(msg=>{document.getElementById('err').textContent=msg})</script></body></html>
