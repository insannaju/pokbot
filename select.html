<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PokBot — Selecionar Cliente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2b2b2b;color:#ccc;font-family:Arial,sans-serif;font-size:12px;height:100vh;display:flex;flex-direction:column;-webkit-app-region:drag}
#titlebar{background:#1a1a1a;height:28px;display:flex;align-items:center;padding:0 10px;flex-shrink:0}
#titlebar span{color:#e63946;font-weight:bold;font-size:12px;letter-spacing:2px}
.wbtns{margin-left:auto;display:flex;gap:5px;-webkit-app-region:no-drag}
.wbtn{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer}
.wbtn.close{background:#ff5f57}
#content{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-app-region:no-drag}
h3{color:#e63946;font-size:13px;text-align:center}
#proc-list{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:4px;overflow-y:auto}
.proc-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px}
.proc-item:hover{background:#252525}
.proc-item.sel{background:#333;color:#fff}
.proc-item .pid{color:#555;font-size:11px}
#proc-name{width:100%;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:5px 8px;border-radius:3px;font-size:12px}
#btn-select{width:100%;padding:8px;background:#e63946;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:1px}
#btn-select:hover{background:#c1121f}
#status{text-align:center;color:#555;font-size:11px}
</style>
</head>
<body>
<div id="titlebar">
  <span>⚡ PokBot — Selecionar Cliente</span>
  <div class="wbtns">
    <button class="wbtn close" onclick="api.close()"></button>
  </div>
</div>
<div id="content">
  <h3>Selecione o cliente</h3>
  <div id="proc-list"><div style="padding:16px;color:#555;text-align:center">Buscando processos...</div></div>
  <div>
    <div style="color:#888;font-size:11px;margin-bottom:4px">Nome do processo:</div>
    <input id="proc-name" value="PKM" placeholder="Nome do processo">
  </div>
  <button id="btn-select" onclick="selectClient()">Selecionar Cliente</button>
  <div id="status"></div>
</div>

<script>
let selectedProc = null

async function loadProcesses() {
  const list = await api.listProcesses()
  const el = document.getElementById('proc-list')
  if (!list.length) {
    el.innerHTML = '<div style="padding:16px;color:#555;text-align:center">Nenhum cliente encontrado.<br>Abra o PKM LAUNCHER primeiro.</div>'
    return
  }
  el.innerHTML = ''
  list.forEach(p => {
    const div = document.createElement('div')
    div.className = 'proc-item'
    div.innerHTML = `<span>[${p.pid}] ${p.name}</span>`
    div.onclick = () => {
      document.querySelectorAll('.proc-item').forEach(d => d.classList.remove('sel'))
      div.classList.add('sel')
      selectedProc = p
      document.getElementById('proc-name').value = p.name.replace('.exe','')
    }
    el.appendChild(div)
    if (!selectedProc) { div.click() }
  })
}

function selectClient() {
  if (!selectedProc) {
    document.getElementById('status').textContent = 'Selecione um processo!'
    return
  }
  document.getElementById('status').textContent = 'Conectando...'
  setTimeout(() => { api.selectClient(selectedProc) }, 500)
}

loadProcesses()
</script>
</body>
</html>
